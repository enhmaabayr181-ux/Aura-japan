<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURA Japanese — Content Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --space:#0B0D17;
    --space-2:#12162B;
    --line:#242A45;
    --sakura:#E11D48;
    --gold:#D4AF37;
    --ok:#10B981;
    --warn:#F59E0B;
    --txt:#E8EAF2;
    --dim:#8A90AC;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--space);color:var(--txt);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;font-size:14px;line-height:1.55;
  }
  .jp{font-family:'Noto Sans JP',sans-serif}
  code,.m{font-family:var(--mono);font-size:12px}

  /* ---- header ---- */
  header{
    border-bottom:1px solid var(--line);padding:14px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:linear-gradient(180deg,#12162B,#0B0D17);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand b{font-size:16px;letter-spacing:.14em}
  .brand .jp{color:var(--sakura);font-size:15px}
  .tag{
    font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    color:var(--dim);border:1px solid var(--line);
    padding:2px 7px;border-radius:3px;text-transform:uppercase;
  }
  header input{
    background:var(--space);border:1px solid var(--line);color:var(--txt);
    padding:7px 10px;border-radius:5px;font-family:var(--mono);font-size:11px;
  }
  header input:focus{outline:2px solid var(--sakura);outline-offset:1px;border-color:transparent}
  #url{width:260px} #key{width:200px}
  button{
    background:var(--sakura);color:#fff;border:0;padding:7px 15px;
    border-radius:5px;font-weight:700;font-size:12px;cursor:pointer;
    font-family:inherit;
  }
  button:hover{filter:brightness(1.15)}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:500}
  #status{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim)}
  #status.ok{color:var(--ok)} #status.err{color:var(--sakura)}

  /* ---- layout ---- */
  main{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 57px)}
  @media(max-width:860px){main{grid-template-columns:1fr}}

  aside{border-right:1px solid var(--line);padding:16px;overflow-y:auto;max-height:calc(100vh - 57px)}
  @media(max-width:860px){aside{max-height:none;border-right:0;border-bottom:1px solid var(--line)}}

  /* schema-path label = the structural device */
  .path{
    font-family:var(--mono);font-size:9px;letter-spacing:.12em;
    color:var(--dim);text-transform:uppercase;
    margin:16px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--line);
  }
  .path:first-child{margin-top:0}
  .path b{color:var(--gold);font-weight:400}

  .row{
    display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;
    cursor:pointer;border:1px solid transparent;
  }
  .row:hover{background:var(--space-2)}
  .row[aria-selected="true"]{background:var(--space-2);border-color:var(--sakura)}
  .row .n{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px}
  .row .t{flex:1;font-size:13px}
  .row .t small{display:block;color:var(--dim);font-size:11px}
  .pill{
    font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;
    border:1px solid var(--line);color:var(--dim);
  }
  .pill.pub{color:var(--ok);border-color:#16543c}
  .pill.draft{color:var(--warn);border-color:#5c4212}

  section{padding:24px;overflow-y:auto;max-height:calc(100vh - 57px)}
  @media(max-width:860px){section{max-height:none}}

  /* ---- blocks ---- */
  .blk{border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
  .blk>h3{
    background:var(--space-2);padding:9px 14px;font-size:12px;
    display:flex;align-items:center;gap:9px;font-weight:500;
  }
  .blk>h3 .m{color:var(--sakura)}
  .blk>h3 .xp{margin-left:auto;color:var(--gold);font-family:var(--mono);font-size:10px}
  .blk>div{padding:16px}

  h4{font-size:13px;color:var(--gold);margin:14px 0 5px}
  h4:first-child{margin-top:0}
  p{margin-bottom:9px;color:#C9CEE0}

  /* ---- SIGNATURE: the kana card ---- */
  .kanas{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
  .k{
    border:1px solid var(--line);border-radius:8px;padding:13px;
    background:linear-gradient(160deg,#12162B,#0B0D17);
    transition:border-color .15s;
  }
  .k:hover{border-color:var(--sakura)}
  .k .top{display:flex;align-items:baseline;gap:9px;margin-bottom:8px}
  .k .g{font-family:'Noto Sans JP';font-size:40px;line-height:1;color:#fff}
  .k .r{font-family:var(--mono);font-size:12px;color:var(--sakura)}
  .k .s{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--dim)}
  .k .mn{font-size:11.5px;color:var(--dim);line-height:1.45;border-top:1px solid var(--line);padding-top:8px}
  .k.star{border-color:#4a3a12}
  .k.star .mn{color:var(--gold)}
  .k.warn{border-color:#5c1e2a}
  .k.warn .mn{color:#ff9db0}

  /* ---- raw jsonb toggle ---- */
  details{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  summary{
    cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--dim);
    letter-spacing:.08em;text-transform:uppercase;
  }
  summary:hover{color:var(--gold)}
  pre{
    background:#080A12;border:1px solid var(--line);border-radius:6px;
    padding:12px;margin-top:9px;overflow-x:auto;
    font-family:var(--mono);font-size:11px;color:#9fb3d1;line-height:1.5;
  }

  .empty{color:var(--dim);text-align:center;padding:60px 20px}
  .empty b{display:block;color:var(--txt);margin-bottom:6px;font-size:15px}
  .err{border:1px solid var(--sakura);border-radius:8px;padding:14px;background:#1a0d13}
  .err b{color:var(--sakura)}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .stat{border:1px solid var(--line);border-radius:6px;padding:8px 12px;min-width:82px}
  .stat b{display:block;font-family:var(--mono);font-size:18px;color:var(--gold)}
  .stat span{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .stat.bad b{color:var(--sakura)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand"><b>AURA</b><span class="jp">日本語</span></div>
  <span class="tag">content inspector</span>
  <input id="url" placeholder="https://xxx.supabase.co" autocomplete="off">
  <input id="key" placeholder="anon key" autocomplete="off" type="password">
  <button id="go">Холбогдох</button>
  <button id="kana" class="ghost">かな 92</button>
  <span id="status">салгагдсан</span>
</header>

<main>
  <aside id="tree">
    <div class="empty" style="padding:30px 10px">
      <b>Холбогдоно уу</b>
      Supabase URL + anon key оруулаад<br>«Холбогдох» дар.
    </div>
  </aside>
  <section id="view">
    <div class="empty">
      <b>Хичээл сонгоно уу</b>
      Зүүн талаас модуль → хичээл сонгоход<br>lesson_blocks энд гарна.
    </div>
  </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ─────────────────────────────────────────────────────────────────────
// AURA төслийн тохиргоо
// anon key нь ОЛОН НИЙТЭД нээлттэй байхаар зохиогдсон — RLS хамгаална.
// ⚠️ service_role key-г ЭНД ХЭЗЭЭ Ч БҮҮ тавь.
// ─────────────────────────────────────────────────────────────────────
const CONFIG = {
  url: 'https://avrgwlozvvmsctuhxmgu.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2cmd3bG96dnZtc2N0dWh4bWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODg1ODksImV4cCI6MjA5OTg2NDU4OX0.N7-ud-ZVewpd4gepec4soVKRvQwP27amgt3eNiSG4_E'
};

let sb = null;
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const setStatus = (t, c='') => { $('status').textContent = t; $('status').className = c; };

// ── connect ────────────────────────────────────────────────────────
$('go').onclick = async () => {
  const url = $('url').value.trim(), key = $('key').value.trim();
  if (!url || !key) return setStatus('URL ба key хэрэгтэй', 'err');
  try {
    sb = createClient(url, key);
    setStatus('шалгаж байна…');
    await loadTree();
  } catch (e) {
    setStatus('алдаа', 'err');
    const m = e.message || String(e);
    let hint = '';
    if (/relation .* does not exist|schema cache|PGRST205/i.test(m))
      hint = '<b style="color:var(--gold)">Шалтгаан:</b> Хүснэгт үүсээгүй байна.<br>' +
             'Supabase → SQL Editor → <code>01_schema.sql</code> ажиллуул.';
    else if (/JWT|apikey|Invalid/i.test(m))
      hint = '<b style="color:var(--gold)">Шалтгаан:</b> anon key буруу байна.<br>' +
             'Supabase → Settings → API → <code>anon public</code> хуулж ав.';
    else if (/Failed to fetch|NetworkError/i.test(m))
      hint = '<b style="color:var(--gold)">Шалтгаан:</b> URL буруу, эсвэл төсөл унтарсан байна.';
    $('view').innerHTML =
      `<div class="err"><b>Холбогдож чадсангүй</b><pre>${esc(m)}</pre>${hint ? '<p style="margin-top:10px">'+hint+'</p>' : ''}</div>`;
  }
};

// ── tree: languages → levels → modules → lessons ────────────────────
async function loadTree() {
  const { data: langs, error: e1 } = await sb
    .from('languages').select('id,code,name_mn,name_native,flag_emoji,framework')
    .order('display_order');
  if (e1) throw e1;
  if (!langs?.length) {
    setStatus('хоосон', 'err');
    $('tree').innerHTML = `<div class="err"><b>languages хоосон</b><br>
      <code>02_seed_japanese.sql</code> ажиллуулаагүй байна.</div>`;
    return;
  }

  const ja = langs.find(l => l.code === 'ja') || langs[0];
  setStatus(`${langs.length} хэл · ${ja.code}`, 'ok');

  const { data: courses } = await sb.from('courses').select('id').eq('language_id', ja.id);
  const cid = courses?.[0]?.id;

  const { data: levels } = await sb.from('levels')
    .select('id,code,name_mn,lesson_count,target_kanji,status')
    .eq('course_id', cid).order('display_order');

  let h = `<div class="path">table <b>languages</b></div>`;
  h += langs.map(l => `<div class="row" aria-selected="${l.id===ja.id}">
      <span class="n">${l.flag_emoji||''}</span>
      <span class="t">${esc(l.name_mn)}<small class="jp">${esc(l.name_native)} · ${esc(l.framework)}</small></span>
    </div>`).join('');

  h += `<div class="path">table <b>levels</b> → modules → lessons</div>`;
  for (const lv of (levels||[])) {
    h += `<div class="row" style="cursor:default">
      <span class="n">${esc(lv.code)}</span>
      <span class="t">${esc(lv.name_mn)}<small>${lv.lesson_count} хичээл · ${lv.target_kanji} ханз</small></span>
      <span class="pill ${lv.status==='published'?'pub':'draft'}">${esc(lv.status)}</span>
    </div>`;

    const { data: mods } = await sb.from('modules')
      .select('id,title_mn,title_native,display_order,status')
      .eq('level_id', lv.id).order('display_order');

    for (const m of (mods||[])) {
      const { data: less } = await sb.from('lessons')
        .select('id,title_mn,title_native,display_order,status,xp_reward')
        .eq('module_id', m.id).order('display_order');

      if (!less?.length) continue;
      h += `<div style="margin:9px 0 3px;padding-left:8px;font-size:11px;color:var(--dim)">
        <span class="jp">${esc(m.title_native||'')}</span> — ${esc(m.title_mn)}</div>`;
      h += less.map(l => `<div class="row" data-lesson="${l.id}" style="padding-left:16px">
          <span class="n">${l.display_order}</span>
          <span class="t"><span class="jp">${esc(l.title_native||'')}</span><small>${esc(l.title_mn)}</small></span>
          <span class="pill ${l.status==='published'?'pub':'draft'}">${l.status==='published'?'pub':'drf'}</span>
        </div>`).join('');
    }
  }
  $('tree').innerHTML = h;

  $('tree').querySelectorAll('[data-lesson]').forEach(el => {
    el.onclick = () => {
      $('tree').querySelectorAll('[data-lesson]').forEach(x => x.setAttribute('aria-selected','false'));
      el.setAttribute('aria-selected','true');
      showLesson(el.dataset.lesson);
    };
  });
}

// ── lesson blocks ───────────────────────────────────────────────────
async function showLesson(id) {
  $('view').innerHTML = `<div class="empty">ачааллаж байна…</div>`;
  const { data: lesson } = await sb.from('lessons')
    .select('title_mn,title_native,display_order,estimated_minutes,xp_reward').eq('id', id).single();
  const { data: blocks, error } = await sb.from('lesson_blocks')
    .select('*').eq('lesson_id', id).order('display_order');

  if (error) return $('view').innerHTML = `<div class="err"><b>Алдаа</b><pre>${esc(error.message)}</pre></div>`;
  if (!blocks?.length) return $('view').innerHTML = `<div class="empty"><b>Блок алга</b>Энэ хичээлд lesson_blocks байхгүй.</div>`;

  let h = `<div style="margin-bottom:18px">
    <div class="m" style="color:var(--dim);letter-spacing:.1em">LESSON ${lesson.display_order}</div>
    <div class="jp" style="font-size:26px;margin:3px 0">${esc(lesson.title_native||'')}</div>
    <div style="color:var(--dim)">${esc(lesson.title_mn)}</div>
  </div>
  <div class="stats">
    <div class="stat"><b>${blocks.length}</b><span>блок</span></div>
    <div class="stat"><b>${lesson.estimated_minutes}</b><span>минут</span></div>
    <div class="stat"><b>${lesson.xp_reward}</b><span>xp</span></div>
  </div>`;

  for (const b of blocks) h += renderBlock(b);
  $('view').innerHTML = h;
}

function renderBlock(b) {
  const c = b.content || {};
  let body = '';

  if (c.type === 'explanation') {
    body = (c.sections||[]).map(s =>
      `<h4>${esc(s.heading_mn)}</h4><p>${esc(s.body_mn)}</p>`).join('');
    if (c.mongolian_bridge) {
      const st = c.bridge_strength || 0;
      body += `<div style="margin-top:12px;border-left:2px solid var(--gold);padding-left:11px">
        <div class="m" style="color:var(--gold)">${'⭐'.repeat(st)} МОНГОЛ ГҮҮР</div>
        <div style="font-size:13px">${esc(c.mongolian_bridge)}</div></div>`;
    }
  } else if (c.type === 'kana_intro' || c.type === 'kana_chart') {
    body = `<div class="m" style="color:var(--dim);margin-bottom:9px">${(c.kana||[]).length||46} тэмдэгт · ${esc(c.kana_type||'')}</div>
      <div class="jp" style="font-size:32px;letter-spacing:.14em">${(c.kana||[]).map(esc).join(' ')}</div>`;
  } else if (c.type === 'quiz') {
    body = `<p>${c.question_count} асуулт · ${(c.question_types||[]).join(', ')||'холимог'}</p>`;
  } else if (c.type === 'handwriting') {
    body = `<div class="jp" style="font-size:30px;letter-spacing:.14em">${(c.kana||[]).map(esc).join(' ')}</div>
      <p style="margin-top:9px">× ${c.repetitions} удаа${c.note_mn ? '<br>'+esc(c.note_mn) : ''}</p>`;
  } else if (c.type === 'wrapup') {
    body = (c.new_vocabulary||[]).map(v =>
      `<div style="display:flex;gap:12px;padding:5px 0;border-bottom:1px solid var(--line)">
        <span class="jp" style="font-size:17px;min-width:78px">${esc(v.word)}</span>
        <span style="color:var(--dim)">${esc(v.meaning_mn)}</span></div>`).join('');
    if (c.srs_add) body += `<p style="margin-top:10px" class="m">SRS → ${c.srs_add.length} карт</p>`;
  } else if (c.type === 'intro' || c.type === 'review') {
    body = `<p>${esc(c.text_mn || `Хичээл ${c.from_lesson}-аас ${c.question_count} асуулт`)}</p>`;
  } else {
    body = `<p class="m" style="color:var(--dim)">${esc(c.type||'?')}</p>`;
  }

  // ⭐ the risk: show the raw JSONB next to the render — that's the whole schema thesis
  return `<div class="blk">
    <h3><span class="m">${esc(b.block_type)}</span> ${esc(b.title_mn||'')}
      <span class="xp">+${b.xp_reward} XP</span></h3>
    <div>${body}
      <details><summary>content jsonb</summary><pre>${esc(JSON.stringify(c,null,2))}</pre></details>
    </div></div>`;
}

// ── auto-connect on load ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  $('url').value = CONFIG.url;
  $('key').value = CONFIG.key;
  if (CONFIG.url && CONFIG.key) $('go').click();
});

// ── kana view ───────────────────────────────────────────────────────
$('kana').onclick = async () => {
  if (!sb) return setStatus('эхлээд холбогдоно уу', 'err');
  const { data, error } = await sb.from('kana')
    .select('character,kana_type,romaji,stroke_count,mnemonic_mn')
    .order('kana_type').order('display_order');
  if (error) return $('view').innerHTML = `<div class="err"><b>Алдаа</b><pre>${esc(error.message)}</pre></div>`;

  const hi = data.filter(k => k.kana_type==='hiragana');
  const ka = data.filter(k => k.kana_type==='katakana');
  const noMn = data.filter(k => !k.mnemonic_mn).length;

  const card = k => {
    const m = k.mnemonic_mn || '';
    const cls = m.includes('⚠️') ? 'warn' : m.includes('⭐') ? 'star' : '';
    return `<div class="k ${cls}">
      <div class="top"><span class="g">${esc(k.character)}</span>
        <span class="r">${esc(k.romaji)}</span>
        <span class="s">${k.stroke_count||'?'} зураас</span></div>
      <div class="mn">${esc(m) || '<i style="color:var(--sakura)">санамж алга</i>'}</div>
    </div>`;
  };

  $('view').innerHTML = `
    <div class="stats">
      <div class="stat ${hi.length!==46?'bad':''}"><b>${hi.length}</b><span>ひらがな</span></div>
      <div class="stat ${ka.length!==46?'bad':''}"><b>${ka.length}</b><span>カタカナ</span></div>
      <div class="stat ${noMn?'bad':''}"><b>${noMn}</b><span>санамжгүй</span></div>
    </div>
    <div class="path">table <b>kana</b> · hiragana</div>
    <div class="kanas">${hi.map(card).join('')}</div>
    <div class="path" style="margin-top:22px">table <b>kana</b> · katakana</div>
    <div class="kanas">${ka.map(card).join('')}</div>`;
  setStatus(`かな ${data.length}`, data.length===92 ? 'ok' : 'err');
};
</script>
</body>
</html>
