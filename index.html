<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AURA 日本語 · Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --space:#0B0D17; --panel:#141829; --panel2:#1B2038; --line:#252B45;
  --ink:#E9EBF7; --muted:#8A90B0; --sakura:#E11D48; --gold:#D4AF37; --green:#22C55E;
  --jp:'Noto Sans JP',sans-serif; --ui:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(1200px 600px at 80% -10%,#171c33 0,transparent 60%),var(--space);
  color:var(--ink);font-family:var(--ui);font-size:15px;line-height:1.55;
}
a{color:var(--gold)}
header{
  position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:18px;
  padding:14px 22px;background:rgba(11,13,23,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
.brand .jp{font-family:var(--jp);font-weight:900;color:var(--sakura)}
.brand small{color:var(--muted);font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:10px}
.stats{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.stat{text-align:right}
.stat b{font-family:var(--mono);color:var(--gold);font-size:16px;display:block;line-height:1.1}
.stat span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 3px rgba(255,255,255,.04)}
.dot.ok{background:var(--green)}
.dot.err{background:var(--sakura)}
.levels{display:flex;gap:8px;padding:12px 22px;border-bottom:1px solid var(--line);overflow-x:auto}
.lvl{
  border:1px solid var(--line);background:var(--panel);color:var(--ink);
  padding:7px 16px;border-radius:999px;cursor:pointer;font-weight:700;white-space:nowrap;
  display:flex;align-items:center;gap:8px;transition:.15s;
}
.lvl:hover{border-color:var(--gold)}
.lvl.active{background:linear-gradient(135deg,var(--sakura),#9d1239);border-color:transparent}
.lvl .n{font-family:var(--mono);opacity:.7;font-size:12px}
.wrap{display:flex;min-height:calc(100vh - 118px)}
aside{
  width:300px;flex:none;border-right:1px solid var(--line);padding:14px;
  overflow-y:auto;max-height:calc(100vh - 118px);position:sticky;top:118px;
}
.search{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-family:var(--ui);margin-bottom:12px}
.search::placeholder{color:var(--muted)}
.mod{margin-bottom:6px}
.mod>.mhead{
  display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:9px;cursor:pointer;
  font-weight:700;font-size:13px;
}
.mod>.mhead:hover{background:var(--panel)}
.mod>.mhead .native{font-family:var(--jp);color:var(--gold);font-weight:700;font-size:12px;margin-left:auto}
.mod .lessons{margin:2px 0 6px 8px;border-left:1px solid var(--line);padding-left:8px;display:none}
.mod.open .lessons{display:block}
.mod.open>.mhead .chev{transform:rotate(90deg)}
.chev{transition:.15s;color:var(--muted);display:inline-block}
.lz{padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:8px}
.lz:hover{background:var(--panel);color:var(--ink)}
.lz.active{background:var(--panel2);color:var(--ink)}
.lz .num{font-family:var(--mono);font-size:11px;opacity:.6;flex:none;width:16px}
.lz .native{font-family:var(--jp);margin-left:auto;font-size:11px;opacity:.55}
main{flex:1;padding:26px 34px;overflow-x:hidden;max-width:920px}
.lessonhdr{margin-bottom:20px}
.lessonhdr .crumb{color:var(--muted);font-size:12px;letter-spacing:.4px;margin-bottom:6px}
.lessonhdr h1{margin:0;font-size:26px;font-weight:800}
.lessonhdr .jp{font-family:var(--jp);color:var(--gold);font-weight:700;font-size:16px;margin-top:2px}
.lessonhdr .meta{margin-top:8px;display:flex;gap:14px;color:var(--muted);font-size:12px;font-family:var(--mono)}
.block{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.block .btag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--muted);margin-bottom:12px}
.btag .pip{width:7px;height:7px;border-radius:2px;background:var(--gold)}
.btag.quiz .pip{background:var(--sakura)}
.btag.matching .pip{background:#8b5cf6}
.btag.wrapup .pip{background:var(--green)}
.btag.intro .pip{background:#38bdf8}
.sec{margin-bottom:12px}
.sec h4{margin:0 0 3px;font-size:14px}
.sec p{margin:0;color:#c3c8e2}
.bridge{margin-top:12px;padding:12px 14px;border-radius:10px;background:linear-gradient(135deg,rgba(225,29,72,.12),rgba(212,175,55,.08));
  border:1px solid rgba(212,175,55,.25)}
.bridge .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);display:flex;align-items:center;gap:8px}
.bridge .strength{display:inline-flex;gap:3px}
.bridge .strength i{width:6px;height:6px;border-radius:50%;background:var(--line);display:inline-block}
.bridge .strength i.on{background:var(--gold)}
.bridge p{margin:6px 0 0;color:#e6d9b8}
.ex{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line)}
.ex:last-child{border-bottom:0}
.ex .jp{font-family:var(--jp);font-size:16px;flex:1}
.ex .mn{color:var(--muted);flex:1;font-size:14px}
.q{padding:12px 0;border-bottom:1px dashed var(--line)}
.q:last-child{border-bottom:0}
.q .qt{font-weight:600;margin-bottom:8px}
.opts{display:grid;gap:6px}
.opt{padding:7px 12px;border-radius:8px;border:1px solid var(--line);font-family:var(--jp);font-size:14px;
  display:flex;align-items:center;gap:8px}
.opt.correct{border-color:var(--green);background:rgba(34,197,94,.12);color:#bbf7d0}
.opt.correct::before{content:'✓';color:var(--green);font-weight:800;font-family:var(--ui)}
.opt.plain::before{content:'○';color:var(--muted);font-family:var(--ui);opacity:.5}
.expl{margin-top:7px;font-size:12px;color:var(--muted)}
.pairs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pair{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;
  border:1px solid var(--line);border-radius:9px}
.pair .jp{font-family:var(--jp);font-size:17px;font-weight:500}
.pair .rd{font-family:var(--jp);color:var(--muted);font-size:11px}
.pair .mn{color:var(--gold);font-size:13px}
.vocab{display:grid;gap:8px}
.v{display:flex;align-items:center;gap:12px;padding:8px 12px;border:1px solid var(--line);border-radius:9px}
.v .w{font-family:var(--jp);font-size:17px;font-weight:500;min-width:70px}
.v .rd{font-family:var(--jp);color:var(--muted);font-size:12px;min-width:80px}
.v .mn{color:#c3c8e2}
.intro{font-size:15px;color:#dfe3f5}
.empty{color:var(--muted);text-align:center;padding:80px 20px}
.empty .jp{font-family:var(--jp);font-size:40px;color:var(--line);display:block;margin-bottom:10px}
.err{background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.4);color:#fecaca;
  padding:14px 18px;border-radius:12px;margin:20px 34px}
@media(max-width:820px){
  aside{display:none} main{padding:20px}
  .stats .stat:nth-child(n+3){display:none}
}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="jp">日本語</span> AURA <small>Studio</small></div>
  <div class="stats">
    <div class="stat"><b id="s-mod">–</b><span>модуль</span></div>
    <div class="stat"><b id="s-les">–</b><span>хичээл</span></div>
    <div class="stat"><b id="s-blk">–</b><span>блок</span></div>
    <div class="stat" style="display:flex;align-items:center;gap:8px;text-align:left">
      <span class="dot" id="conn"></span><span id="conn-t" style="font-size:11px;color:var(--muted)">холбогдож байна…</span>
    </div>
  </div>
</header>

<div class="levels" id="levels"></div>

<div class="wrap">
  <aside>
    <input class="search" id="search" placeholder="Хичээл / модуль хайх…">
    <div id="tree"></div>
  </aside>
  <main id="main">
    <div class="empty"><span class="jp">あ</span>Түвшин сонгоно уу</div>
  </main>
</div>

<div id="err"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─────────────────────────────────────────────────────────────────────
// CONFIG — anon key нь нийтийн (RLS-хамгаалалттай). service_role битгий тавь!
// ─────────────────────────────────────────────────────────────────────
const CONFIG = {
  url: 'https://avrgwlozvvmsctuhxmgu.supabase.co',
  anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2cmd3bG96dnZtc2N0dWh4bWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODg1ODksImV4cCI6MjA5OTg2NDU4OX0.N7-ud-ZVewpd4gepec4soVKRvQwP27amgt3eNiSG4_E'
};

const db = supabase.createClient(CONFIG.url, CONFIG.anon);
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const byOrder=(a,b)=>(a.display_order||0)-(b.display_order||0);

let LEVELS=[], MODS=[], LESSONS=[], BLOCKS=[];
let activeLevel=null, activeLesson=null;

async function boot(){
  try{
    const [lv,md,ls,bl] = await Promise.all([
      db.from('levels').select('*').order('display_order'),
      db.from('modules').select('*').order('display_order'),
      db.from('lessons').select('*').order('display_order'),
      db.from('lesson_blocks').select('*').order('display_order'),
    ]);
    for(const r of [lv,md,ls,bl]) if(r.error) throw r.error;
    LEVELS=lv.data||[]; MODS=md.data||[]; LESSONS=ls.data||[]; BLOCKS=bl.data||[];
    conn(true);
    $('#s-mod').textContent=MODS.length;
    $('#s-les').textContent=LESSONS.length;
    $('#s-blk').textContent=BLOCKS.length;
    renderLevels();
    if(LEVELS.length) selectLevel(LEVELS[0].id);
  }catch(e){
    conn(false);
    $('#err').innerHTML='<div class="err">Холбогдож чадсангүй: '+esc(e.message||e)+
      '<br><small>RLS дээр анонимд SELECT зөвшөөрөгдсөн эсэхийг шалгаарай.</small></div>';
  }
}
function conn(ok){
  $('#conn').className='dot '+(ok?'ok':'err');
  $('#conn-t').textContent = ok?'холбогдсон':'алдаа';
}

function renderLevels(){
  const box=$('#levels'); box.innerHTML='';
  LEVELS.forEach(l=>{
    const modCount=MODS.filter(m=>m.level_id===l.id).length;
    const b=document.createElement('button');
    b.className='lvl'+(l.id===activeLevel?' active':'');
    b.innerHTML=esc(l.code||l.name_mn)+' <span class="n">'+modCount+'</span>';
    b.onclick=()=>selectLevel(l.id);
    box.appendChild(b);
  });
}

function selectLevel(id){
  activeLevel=id; activeLesson=null;
  renderLevels(); renderTree();
  const first=firstLessonOfLevel(id);
  if(first) selectLesson(first.id);
  else $('#main').innerHTML='<div class="empty"><span class="jp">…</span>Энэ түвшинд хичээл алга</div>';
}
function firstLessonOfLevel(id){
  const mods=MODS.filter(m=>m.level_id===id).sort(byOrder);
  for(const m of mods){
    const ls=LESSONS.filter(x=>x.module_id===m.id).sort(byOrder);
    if(ls.length) return ls[0];
  }
  return null;
}

function renderTree(){
  const q=($('#search').value||'').toLowerCase().trim();
  const tree=$('#tree'); tree.innerHTML='';
  const mods=MODS.filter(m=>m.level_id===activeLevel).sort(byOrder);
  mods.forEach(m=>{
    let ls=LESSONS.filter(x=>x.module_id===m.id).sort(byOrder);
    let mm=true;
    if(q){
      mm=(m.title_mn+m.title_native).toLowerCase().includes(q);
      ls=ls.filter(x=>mm || (x.title_mn+x.title_native).toLowerCase().includes(q));
      if(!ls.length && !mm) return;
    }
    const el=document.createElement('div');
    el.className='mod'+((q||ls.some(x=>x.id===activeLesson))?' open':'');
    el.innerHTML='<div class="mhead"><span class="chev">▸</span>'+esc(m.title_mn)+
      '<span class="native">'+esc(m.title_native)+'</span></div><div class="lessons"></div>';
    el.querySelector('.mhead').onclick=()=>el.classList.toggle('open');
    const lc=el.querySelector('.lessons');
    ls.forEach(x=>{
      const lz=document.createElement('div');
      lz.className='lz'+(x.id===activeLesson?' active':'');
      lz.innerHTML='<span class="num">'+(x.display_order||'')+'</span>'+esc(x.title_mn)+
        '<span class="native">'+esc(x.title_native)+'</span>';
      lz.onclick=()=>selectLesson(x.id);
      lc.appendChild(lz);
    });
    tree.appendChild(el);
  });
  if(!tree.children.length) tree.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Илэрц алга</div>';
}

function selectLesson(id){
  activeLesson=id; renderTree();
  const L=LESSONS.find(x=>x.id===id); if(!L) return;
  const M=MODS.find(m=>m.id===L.module_id)||{};
  const LV=LEVELS.find(l=>l.id===M.level_id)||{};
  const blocks=BLOCKS.filter(b=>b.lesson_id===id).sort(byOrder);
  let html='<div class="lessonhdr">'+
      '<div class="crumb">'+esc(LV.code||LV.name_mn||'')+' › '+esc(M.title_mn||'')+
      ' <span style="font-family:var(--jp)">'+esc(M.title_native||'')+'</span></div>'+
      '<h1>'+esc(L.title_mn)+'</h1>'+
      '<div class="jp">'+esc(L.title_native||'')+'</div>'+
      '<div class="meta"><span>+'+(L.xp_reward||0)+' XP</span><span>'+(L.estimated_minutes||0)+' мин</span><span>'+blocks.length+' блок</span></div>'+
    '</div>';
  html += blocks.map(renderBlock).join('') || '<div class="empty">Блок алга</div>';
  $('#main').innerHTML=html;
  window.scrollTo(0,0);
}

function content(b){ let c=b.content; if(typeof c==='string'){try{c=JSON.parse(c)}catch(e){c={}}} return c||{}; }

function renderBlock(b){
  const c=content(b), t=c.type||b.block_type||'';
  const tag='<div class="btag '+esc(t)+'"><span class="pip"></span>'+esc(b.title_mn||t)+'</div>';
  let body='';
  if(t==='explanation'){
    body=(c.sections||[]).map(s=>'<div class="sec"><h4>'+esc(s.heading_mn)+'</h4><p>'+esc(s.body_mn)+'</p></div>').join('');
    if(c.mongolian_bridge){
      const st=Math.max(0,Math.min(3,c.bridge_strength||0));
      const pips=[0,1,2].map(i=>'<i class="'+(i<st?'on':'')+'"></i>').join('');
      body+='<div class="bridge"><div class="lab">🌉 Монгол гүүр <span class="strength">'+pips+'</span></div><p>'+esc(c.mongolian_bridge)+'</p></div>';
    }
  }else if(t==='example'){
    body=(c.examples||[]).map(e=>'<div class="ex"><div class="jp">'+esc(e.jp)+'</div><div class="mn">'+esc(e.mn)+'</div></div>').join('');
  }else if(t==='quiz'){
    body=(c.questions||[]).map(q=>{
      const opts=(q.options||[]).map(o=>'<div class="opt '+(o===q.answer?'correct':'plain')+'">'+esc(o)+'</div>').join('');
      return '<div class="q"><div class="qt">'+esc(q.q)+'</div><div class="opts">'+opts+'</div>'+(q.explain_mn?'<div class="expl">'+esc(q.explain_mn)+'</div>':'')+'</div>';
    }).join('');
  }else if(t==='matching'){
    const pairs=(c.pairs||[]).map(p=>'<div class="pair"><div><span class="jp">'+esc(p.jp)+'</span> '+(p.reading&&p.reading!==p.jp?'<span class="rd">'+esc(p.reading)+'</span>':'')+'</div><div class="mn">'+esc(p.mn)+'</div></div>').join('');
    body=(c.instruction_mn?'<div class="expl" style="margin-bottom:10px">'+esc(c.instruction_mn)+'</div>':'')+'<div class="pairs">'+pairs+'</div>';
  }else if(t==='wrapup'){
    body='<div class="vocab">'+(c.new_vocabulary||[]).map(v=>'<div class="v"><span class="w">'+esc(v.word)+'</span><span class="rd">'+esc(v.reading)+'</span><span class="mn">'+esc(v.meaning_mn)+'</span></div>').join('')+'</div>';
  }else if(t==='intro'){
    body='<div class="intro">'+esc(c.text_mn)+'</div>';
  }else{
    body='<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:12px;color:var(--muted)">'+esc(JSON.stringify(c,null,2))+'</pre>';
  }
  return '<div class="block">'+tag+body+'</div>';
}

$('#search').addEventListener('input',renderTree);
boot();
</script>
</body>
</html>
