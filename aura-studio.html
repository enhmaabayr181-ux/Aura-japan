<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURA 日本語 — Хичээлийн агуулга</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --space:#0B0D17; --space-2:#12162B; --line:#242A45;
    --sakura:#E11D48; --gold:#D4AF37; --ok:#10B981; --warn:#F59E0B;
    --txt:#E8EAF2; --dim:#8A90AC; --mono:'JetBrains Mono',monospace;
    --hh:110px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--space);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.55}
  .jp{font-family:'Noto Sans JP',sans-serif}
  code,.m{font-family:var(--mono);font-size:12px}

  /* ---- header ---- */
  header{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#12162B,#0B0D17)}
  .hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 20px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand b{font-size:16px;letter-spacing:.14em}
  .brand .jp{color:var(--sakura);font-size:15px}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);
    border:1px solid var(--line);padding:2px 7px;border-radius:3px;text-transform:uppercase}
  #status{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim)}
  #status.ok{color:var(--ok)} #status.err{color:var(--sakura)}
  #auth{display:flex;align-items:center;gap:7px}
  .auth-badge{font-family:var(--mono);font-size:10px;color:var(--ok);border:1px solid #16543c;border-radius:4px;padding:3px 7px}

  button{background:var(--sakura);color:#fff;border:0;padding:7px 15px;border-radius:5px;
    font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
  button:hover{filter:brightness(1.15)}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button.mini{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:500;padding:5px 11px;font-size:11px}
  button.mini:hover{border-color:var(--gold);color:var(--gold);filter:none}

  /* ---- tabs (хэсгүүд) ---- */
  .tabbar{display:flex;gap:6px;padding:0 20px 11px;overflow-x:auto}
  .tab{white-space:nowrap;background:transparent;border:1px solid var(--line);color:var(--dim);
    padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .tab:hover{color:var(--txt);border-color:var(--dim);filter:none}
  .tab.on{background:var(--sakura);border-color:var(--sakura);color:#fff}
  .tab.util{border-style:dashed}
  .tab.util.on{border-style:solid}

  /* ---- settings (нуугдмал) ---- */
  .settings{display:none;padding:12px 20px;border-top:1px solid var(--line);background:var(--space-2);
    flex-wrap:wrap;gap:9px;align-items:center}
  .settings.open{display:flex}
  .settings input{background:var(--space);border:1px solid var(--line);color:var(--txt);
    padding:6px 9px;border-radius:5px;font-family:var(--mono);font-size:11px}
  .settings .setlab{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  .settings .setdiv{flex-basis:100%;height:0}
  #url{width:220px} #key{width:170px}

  /* ---- layout ---- */
  main{display:grid;grid-template-columns:290px 1fr}
  main.solo{grid-template-columns:1fr}
  main.solo aside{display:none}
  @media(max-width:860px){main,main.solo{grid-template-columns:1fr}}
  aside{border-right:1px solid var(--line);padding:16px;overflow-y:auto;max-height:calc(100vh - var(--hh))}
  section{padding:24px;overflow-y:auto;max-height:calc(100vh - var(--hh))}
  @media(max-width:860px){
    aside{max-height:none;border-right:0;border-bottom:1px solid var(--line)}
    section{max-height:none}
  }

  /* ---- lesson list ---- */
  .lvhead{margin-bottom:6px}
  .lvhead b{font-size:15px}
  .lvhead span{display:block;color:var(--dim);font-size:12px}
  .modhead{margin:14px 0 4px;font-size:11px;color:var(--dim)}
  .row{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:6px;cursor:pointer;border:1px solid transparent}
  .row:hover{background:var(--space-2)}
  .row[aria-selected="true"]{background:var(--space-2);border-color:var(--sakura)}
  .row .n{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:18px}
  .row .t{flex:1;font-size:13px}
  .row .t small{display:block;color:var(--dim);font-size:11px}
  .pill{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--line);color:var(--dim)}
  .pill.pub{color:var(--ok);border-color:#16543c}
  .pill.draft{color:var(--warn);border-color:#5c4212}
  .note{border:1px solid var(--line);border-radius:8px;padding:14px;color:var(--dim);font-size:13px;margin-top:12px;line-height:1.6}

  /* ---- welcome ---- */
  .welcome{max-width:62ch}
  .welcome h2{font-size:21px;margin-bottom:10px}
  .welcome p{color:#C9CEE0;margin-bottom:9px}
  .welcome .hint{color:var(--dim);font-size:13px}

  /* ---- blocks ---- */
  .blk{border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
  .blk>h3{background:var(--space-2);padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:9px;font-weight:500}
  .blk>h3 .m{color:var(--sakura)}
  .blk>h3 .xp{margin-left:auto;color:var(--gold);font-family:var(--mono);font-size:10px}
  .blk>div{padding:16px}
  h4{font-size:13px;color:var(--gold);margin:14px 0 5px}
  h4:first-child{margin-top:0}
  p{margin-bottom:9px;color:#C9CEE0}
  .bridge{margin-top:12px;border-left:2px solid var(--gold);padding-left:11px}
  .bridge .m{color:var(--gold)}
  .exline{padding:6px 0;border-bottom:1px solid var(--line)}
  .exline .jp{font-size:16px}
  .exline small{color:var(--dim);font-size:12px;display:block}
  .vrow{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);align-items:baseline}
  .vrow .w{font-size:18px;min-width:84px}
  .vrow .rd{font-family:var(--mono);color:var(--sakura);min-width:64px;font-size:12px}
  .vrow .mn{color:var(--dim);flex:1}

  /* generic renderer */
  .gk{margin:11px 0}
  .gk>.lab{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:5px}
  .kv{display:flex;gap:12px;padding:4px 0;border-bottom:1px solid var(--line)}
  .kv .kk{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:130px;word-break:break-word}
  .kv .vv{flex:1}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tags .tg{border:1px solid var(--line);border-radius:5px;padding:3px 8px;font-size:13px}
  .obj{border:1px solid var(--line);border-radius:6px;padding:9px;margin-bottom:6px}

  /* kana */
  .kanas{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
  .k{border:1px solid var(--line);border-radius:8px;padding:13px;background:linear-gradient(160deg,#12162B,#0B0D17);transition:border-color .15s}
  .k:hover{border-color:var(--sakura)}
  .k .top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .k .g{font-family:'Noto Sans JP';font-size:40px;line-height:1;color:#fff}
  .k .r{font-family:var(--mono);font-size:12px;color:var(--sakura)}
  .k .s{font-family:var(--mono);font-size:9px;color:var(--dim)}
  .k .mn{font-size:11.5px;color:var(--dim);line-height:1.45;border-top:1px solid var(--line);padding-top:8px}
  .k.star{border-color:#4a3a12} .k.star .mn{color:var(--gold)}
  .k.warn{border-color:#5c1e2a} .k.warn .mn{color:#ff9db0}

  /* raw jsonb */
  details{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  summary{cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  summary:hover{color:var(--gold)}
  pre{background:#080A12;border:1px solid var(--line);border-radius:6px;padding:12px;margin-top:9px;overflow-x:auto;font-family:var(--mono);font-size:11px;color:#9fb3d1;line-height:1.5}

  /* editor */
  .editor{border-top:1px dashed var(--line);margin-top:12px;padding-top:12px}
  textarea.edit{width:100%;background:#080A12;border:1px solid var(--line);color:#cfe0f5;font-family:var(--mono);font-size:11.5px;line-height:1.5;border-radius:6px;padding:11px;min-height:200px;resize:vertical}
  textarea.edit:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .edit-row{display:flex;gap:9px;align-items:center;margin:9px 0;flex-wrap:wrap}
  .edit-row label{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;min-width:74px}
  .edit-row input{background:var(--space);border:1px solid var(--line);color:var(--txt);padding:6px 9px;border-radius:5px;font-family:var(--mono);font-size:12px}
  .save-msg{font-family:var(--mono);font-size:11px}
  .save-msg.ok{color:var(--ok)} .save-msg.err{color:var(--sakura)}

  /* QA */
  .qa-verdict{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .qa-verdict.good{border-color:#16543c;background:#0c1a14}
  .qa-verdict.bad{border-color:#5c1e2a;background:#1a0d13}
  .qa-verdict .big{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
  .qa-verdict.good .big{color:var(--ok)} .qa-verdict.bad .big{color:var(--sakura)}
  .qa-verdict .lab{font-size:12px;color:var(--dim)}
  .qa-group{margin:18px 0 8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .issue{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;font-size:12.5px}
  .issue .ic{font-family:var(--mono);font-weight:700;min-width:15px}
  .issue.e{border-color:#5c1e2a} .issue.e .ic{color:var(--sakura)}
  .issue.w{border-color:#5c4212} .issue.w .ic{color:var(--warn)}
  .issue.i .ic{color:var(--dim)}
  .issue.g{border-color:#16543c} .issue.g .ic{color:var(--ok)}
  .issue a{color:var(--gold);cursor:pointer;text-decoration:underline}
  .typedist{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .typedist span{font-family:var(--mono);font-size:10px;border:1px solid var(--line);border-radius:4px;padding:3px 7px;color:var(--dim)}
  .typedist span.new{border-color:#5c4212;color:var(--warn)}

  /* shared */
  .empty{color:var(--dim);text-align:center;padding:60px 20px}
  .empty b{display:block;color:var(--txt);margin-bottom:6px;font-size:15px}
  .err{border:1px solid var(--sakura);border-radius:8px;padding:14px;background:#1a0d13}
  .err b{color:var(--sakura)}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .stat{border:1px solid var(--line);border-radius:6px;padding:8px 12px;min-width:82px}
  .stat b{display:block;font-family:var(--mono);font-size:18px;color:var(--gold)}
  .stat span{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .stat.bad b{color:var(--sakura)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="brand"><b>AURA</b><span class="jp">日本語</span></div>
    <span class="tag">хичээлийн агуулга</span>
    <span id="status">ачааллаж байна…</span>
    <span id="auth"></span>
    <button class="mini" id="gear">⚙ Тохиргоо</button>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div class="settings" id="settings">
    <span class="setlab">Холболт</span>
    <input id="url" placeholder="https://xxx.supabase.co" autocomplete="off">
    <input id="key" type="password" placeholder="anon key" autocomplete="off">
    <button id="go">Дахин холбогдох</button>
    <span class="setdiv"></span>
    <span class="setlab">Эзэмшигчээр нэвтрэх · засварлахад</span>
    <input id="si-email" type="email" placeholder="и-мэйл" autocomplete="off">
    <input id="si-pass" type="password" placeholder="нууц үг" autocomplete="off">
    <button id="si-go">Нэвтрэх</button>
    <span id="si-msg" class="save-msg"></span>
  </div>
</header>

<main id="main">
  <aside id="tree"></aside>
  <section id="view">
    <div class="empty"><b>Ачааллаж байна…</b>Хичээлийн санг татаж байна.</div>
  </section>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ─────────────────────────────────────────────────────────────────────
// AURA тохиргоо · anon key олон нийтэд нээлттэй (RLS хамгаална).
// ⚠️ service_role key-г ЭНД ХЭЗЭЭ Ч БҮҮ тавь.
// ─────────────────────────────────────────────────────────────────────
const CONFIG = {
  url: 'https://avrgwlozvvmsctuhxmgu.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2cmd3bG96dnZtc2N0dWh4bWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODg1ODksImV4cCI6MjA5OTg2NDU4OX0.N7-ud-ZVewpd4gepec4soVKRvQwP27amgt3eNiSG4_E'
};

let sb = null, user = null;
let LANG = null, COURSE_ID = null, LEVELS = [];
let currentBlocks = {}, kanaCache = {};

const $  = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const setStatus = (t, c='') => { $('status').textContent = t; $('status').className = c; };
const hasJP = s => /[\u3040-\u30ff\u3400-\u9fbf\uf900-\ufaff\uff66-\uff9f]/.test(String(s ?? ''));
const jp = s => hasJP(s) ? `<span class="jp">${esc(s)}</span>` : esc(s);
const solo = on => $('main').classList.toggle('solo', on);
const errBox = m => `<div class="err"><b>Алдаа</b><pre>${esc(m)}</pre></div>`;

const KNOWN = new Set(['explanation','kana_intro','kana_chart','quiz','handwriting','wrapup',
  'intro','review','vocabulary','vocab','vocab_pack','grammar','grammar_point',
  'dialogue','conversation','example','examples','sentences']);

function measure(){ document.documentElement.style.setProperty('--hh', document.querySelector('header').offsetHeight + 'px'); }
window.addEventListener('resize', measure);

// ── settings / auth ─────────────────────────────────────────────────
$('gear').onclick = () => { $('settings').classList.toggle('open'); measure(); };
$('go').onclick = connect;
$('si-go').onclick = signIn;

async function signIn(){
  if (!sb) return;
  const email = $('si-email').value.trim(), password = $('si-pass').value;
  const msg = $('si-msg'); msg.className = 'save-msg'; msg.textContent = 'нэвтэрч байна…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { msg.className = 'save-msg err'; msg.textContent = error.message; return; }
  user = data.user; renderAuth();
  msg.className = 'save-msg ok'; msg.textContent = '✓ нэвтэрлээ';
}
async function refreshUser(){
  try { const { data } = await sb.auth.getUser(); user = data?.user || null; } catch { user = null; }
  renderAuth();
}
function renderAuth(){
  const el = $('auth');
  el.innerHTML = user
    ? `<span class="auth-badge">✓ ${esc(user.email||'эзэмшигч')}</span><button class="mini" id="signout">Гарах</button>`
    : '';
  if (user) $('signout').onclick = async () => { await sb.auth.signOut(); user = null; renderAuth(); };
}
function permHint(m){
  return /row-level security|RLS|policy|permission|not authorized|401|403/i.test(m)
    ? 'Засах эрх алга — ⚙ Тохиргоо → «Нэвтрэх»-ээр эзэмшигчээр нэвтэрч дахин оролдоно уу.'
    : m;
}

// ── connect / bootstrap ─────────────────────────────────────────────
async function connect(){
  const url = $('url').value.trim(), key = $('key').value.trim();
  if (!url || !key) { setStatus('URL/key дутуу', 'err'); $('settings').classList.add('open'); return; }
  try {
    sb = createClient(url, key);
    setStatus('шалгаж байна…');
    await bootstrap();
    await refreshUser();
  } catch (e) {
    const m = e.message || String(e);
    setStatus('холбогдсонгүй', 'err');
    let hint = '';
    if (/relation .* does not exist|schema cache|PGRST205/i.test(m))
      hint = 'Хүснэгт үүсээгүй байна — Supabase → SQL Editor дээр schema-гаа ажиллуулаарай.';
    else if (/JWT|apikey|Invalid/i.test(m))
      hint = 'anon key буруу байна — ⚙ Тохиргоо дотор шинэчилнэ үү.';
    else if (/Failed to fetch|NetworkError/i.test(m))
      hint = 'Холболт тасарсан — URL буруу эсвэл төсөл унтарсан байж болзошгүй.';
    $('view').innerHTML = `<div class="err"><b>Холбогдож чадсангүй</b><pre>${esc(m)}</pre>${hint?`<p style="margin-top:10px">${hint}</p>`:''}</div>`;
  }
}

async function bootstrap(){
  const { data: langs, error } = await sb.from('languages')
    .select('id,code,name_mn,name_native,flag_emoji').order('display_order');
  if (error) throw error;
  if (!langs?.length){
    setStatus('хоосон', 'err');
    solo(true);
    $('view').innerHTML = `<div class="empty"><b>Хичээл алга</b>Өгөгдлийн санд хэл ороогүй байна. Seed ажиллуулаагүй бол «Шалгах» хоосон гарна.</div>`;
    return;
  }
  LANG = langs.find(l => l.code === 'ja') || langs[0];
  const { data: courses } = await sb.from('courses').select('id').eq('language_id', LANG.id);
  COURSE_ID = courses?.[0]?.id;
  const { data: levels } = await sb.from('levels')
    .select('id,code,name_mn,lesson_count,target_kanji,status').eq('course_id', COURSE_ID).order('display_order');
  LEVELS = levels || [];

  buildTabs();
  setStatus('бэлэн', 'ok');

  if (LEVELS.length){ await showLevel(LEVELS[0].id); $('view').innerHTML = welcomeHome(); }
  else { solo(true); $('view').innerHTML = welcomeHome(); }
}

// ── tabs ────────────────────────────────────────────────────────────
function buildTabs(){
  let h = `<button class="tab" data-tab="kana">Үсэг</button>`;
  h += LEVELS.map(l => `<button class="tab" data-tab="lv-${l.id}">${esc(l.code)} дүрэм</button>`).join('');
  h += `<button class="tab util" data-tab="vocab">Үгс</button>`;
  h += `<button class="tab util" data-tab="qa">Шалгах</button>`;
  $('tabbar').innerHTML = h;
  $('tabbar').querySelectorAll('.tab').forEach(t => t.onclick = () => {
    const d = t.dataset.tab;
    if (d === 'kana') showKana();
    else if (d === 'vocab') showVocab();
    else if (d === 'qa') runQA();
    else if (d.startsWith('lv-')) showLevel(d.slice(3));
  });
  measure();
}
function setTab(id){ $('tabbar').querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === id)); }

function welcomeHome(){
  return `<div class="welcome">
    <h2>AURA-гийн хичээлийн агуулга</h2>
    <p>Энэ бол чиний өгөгдлийн санд хадгалагдсан <b>бүх хичээлийг харах, шалгах, засах</b> самбар — сурагчийн апп биш, багшийн удирдлагын хэсэг.</p>
    <p class="hint">Дээрээс хэсгээ сонгоно уу:</p>
    <div class="issue i"><span class="ic">·</span><span><b>Үсэг</b> — ひらがな / カタカナ, монгол санамжтай нь</span></div>
    <div class="issue i"><span class="ic">·</span><span><b>N5 / N4 / N3 дүрэм</b> — тухайн түвшний хичээлүүд</span></div>
    <div class="issue i"><span class="ic">·</span><span><b>Үгс</b> — бүх хичээлээс цугларсан үгсийн сан</span></div>
    <div class="issue i"><span class="ic">·</span><span><b>Шалгах</b> — дутуу, эвдэрсэн, ороогүй зүйлийг олж хэлнэ</span></div>
  </div>`;
}

function lessonRow(l){

    <span class="t"><span class="jp">${esc(l.title_native||'')}</span><small>${esc(l.title_mn||'')}</small></span>
    <span class="pill ${l.status==='published'?'pub':'draft'}">${l.status==='published'?'нийт':'ноорог'}</span>

async function showLevel(levelId){

    const { data: less } = await sb.from('lessons')
      .select('id,title_mn,title_native,display_order,status').eq('module_id', m.id).order('display_order');

      <p class="hint">Хэрэв өмнө нь оруулсан гэж бодож байвал, магадгүй өөр төсөл/DB-д, эсвэл seed ажиллаагүй. «Шалгах» таб бүх түвшний хичээлийн тоог нэг дор харуулна.</p></div>`;
    return;

    .select('title_mn,title_native,display_order,estimated_minutes,xp_reward').eq('id', id).single();

  if (!blocks?.length) return $('view').innerHTML = `<div class="empty"><b>Блок алга</b>Энэ хичээлд агуулга ороогүй байна.</div>`;

  currentBlocks = {};
  let h = `<div style="margin-bottom:18px">
    <div class="m" style="color:var(--dim);letter-spacing:.1em">ХИЧЭЭЛ ${lesson.display_order ?? ''}</div>
    <div class="jp" style="font-size:26px;margin:3px 0">${esc(lesson.title_native||'')}</div>
    <div style="color:var(--dim)">${esc(lesson.title_mn||'')}</div></div>
    <div class="stats">
      <div class="stat"><b>${blocks.length}</b><span>блок</span></div>
      <div class="stat"><b>${lesson.estimated_minutes ?? '—'}</b><span>минут</span></div>

function renderBlock(b){
  const t = (b.content && b.content.type) || b.block_type || '';
  return `<div class="blk" data-block="${b.id}">
    <h3><span class="m">${esc(t)}</span> ${jp(b.title_mn||'')}
      <span class="xp">+${b.xp_reward||0} XP</span>
      <button class="mini js-edit" data-block="${b.id}" style="margin-left:8px">✎ засах</button></h3>
    <div>
      <div class="rendered">${renderBody(b)}</div>
      <div class="editor" id="ed-${b.id}" style="display:none"></div>
      <details><summary>content jsonb</summary><pre>${esc(JSON.stringify(b.content||{},null,2))}</pre></details>
    </div></div>`;
}

function renderBody(b){
  const c = b.content || {}, t = c.type || b.block_type || '';
  if (t === 'explanation'){
    let body = (c.sections||[]).map(s => `<h4>${esc(s.heading_mn)}</h4><p>${esc(s.body_mn)}</p>`).join('');
    if (c.mongolian_bridge) body += bridgeBox(c.mongolian_bridge, c.bridge_strength||0);
    return body || renderGeneric(c);
  }
  if (t === 'kana_intro' || t === 'kana_chart')
    return `<div class="m" style="color:var(--dim);margin-bottom:9px">${(c.kana||[]).length||46} тэмдэгт · ${esc(c.kana_type||'')}</div>
      <div class="jp" style="font-size:32px;letter-spacing:.14em">${(c.kana||[]).map(esc).join(' ')}</div>`;
  if (t === 'quiz')
    return `<p>${c.question_count ?? '?'} асуулт · ${(c.question_types||[]).join(', ')||'холимог'}</p>`;
  if (t === 'handwriting')
    return `<div class="jp" style="font-size:30px;letter-spacing:.14em">${(c.kana||[]).map(esc).join(' ')}</div>
      <p style="margin-top:9px">× ${c.repetitions ?? '?'} удаа${c.note_mn ? '<br>'+esc(c.note_mn) : ''}</p>`;
  if (t === 'wrapup'){
    let body = (c.new_vocabulary||[]).map(vrow).join('');
    if (c.srs_add) body += `<p style="margin-top:10px" class="m">SRS → ${c.srs_add.length} карт</p>`;
    return body || renderGeneric(c);
  }
  if (t === 'intro' || t === 'review')
    return `<p>${esc(c.text_mn || `Хичээл ${c.from_lesson ?? '?'}-аас ${c.question_count ?? '?'} асуулт`)}</p>`;
  if (t === 'vocabulary' || t === 'vocab' || t === 'vocab_pack'){
    const items = c.words||c.vocabulary||c.items||c.new_vocabulary||[];
    return items.length ? items.map(vrow).join('') : renderGeneric(c);
  }
  if (t === 'grammar' || t === 'grammar_point'){
    let h = '';
    if (c.pattern || c.point) h += `<div class="jp" style="font-size:22px;margin-bottom:6px">${esc(c.pattern||c.point)}</div>`;
    if (c.explanation_mn || c.body_mn) h += `<p>${esc(c.explanation_mn||c.body_mn)}</p>`;
    (c.examples||c.sentences||[]).forEach(e => h += exline(e));
    if (c.mongolian_bridge) h += bridgeBox(c.mongolian_bridge, c.bridge_strength||0);
    return h || renderGeneric(c);
  }
  if (t === 'dialogue' || t === 'conversation'){
    const lines = c.lines||c.dialogue||c.turns||[];
    if (!lines.length) return renderGeneric(c);
    return lines.map(l => `<div class="exline">
      ${l.speaker ? `<div class="m" style="color:var(--gold);font-size:10px">${esc(l.speaker)}</div>` : ''}
      <div class="jp">${esc(l.jp||l.text||l.line||'')}</div>
      ${(l.mn||l.translation_mn) ? `<small>${esc(l.mn||l.translation_mn)}</small>` : ''}</div>`).join('');
  }
  if (t === 'example' || t === 'examples' || t === 'sentences'){
    const ex = c.examples||c.sentences||c.items||[];
    return ex.length ? ex.map(exline).join('') : renderGeneric(c);
  }
  return renderGeneric(c);
}

function vrow(v){
  return `<div class="vrow"><span class="w jp">${esc(v.word||v.jp||v.character||'')}</span>
    ${(v.reading||v.romaji) ? `<span class="rd">${esc(v.reading||v.romaji)}</span>` : ''}
    <span class="mn">${esc(v.meaning_mn||v.meaning||v.mn||'')}</span></div>`;
}
function exline(e){
  if (typeof e === 'string') return `<div class="exline jp">${esc(e)}</div>`;
  const j = e.jp||e.sentence||e.text||e.japanese||'', m = e.mn||e.translation_mn||e.meaning_mn||e.translation||'';
  return `<div class="exline"><div class="jp">${esc(j)}</div>${m ? `<small>${esc(m)}</small>` : ''}</div>`;
}
function bridgeBox(text, st){
  return `<div class="bridge"><div class="m">${'⭐'.repeat(st)} МОНГОЛ ГҮҮР</div><div style="font-size:13px">${esc(text)}</div></div>`;
}
function renderGeneric(c){
  const keys = Object.keys(c).filter(k => k !== 'type');
  if (!keys.length) return `<p class="m" style="color:var(--dim)">хоосон агуулга</p>`;
  return keys.map(k => renderVal(k, c[k])).join('');
}
function renderVal(key, val){
  const lab = `<div class="lab">${esc(key)}</div>`;
  if (Array.isArray(val)){
    if (!val.length) return `<div class="gk">${lab}<span class="m" style="color:var(--dim)">— хоосон</span></div>`;
    if (val.every(x => typeof x !== 'object' || x === null))
      return `<div class="gk">${lab}<div class="tags">${val.map(x => `<span class="tg">${jp(x)}</span>`).join('')}</div></div>`;
    return `<div class="gk">${lab}${val.map(o => `<div class="obj">${objRows(o)}</div>`).join('')}</div>`;
  }
  if (val && typeof val === 'object') return `<div class="gk">${lab}<div class="obj">${objRows(val)}</div></div>`;
  return `<div class="kv"><span class="kk">${esc(key)}</span><span class="vv">${jp(val)}</span></div>`;
}
function objRows(o){
  if (o === null || typeof o !== 'object') return `<span class="vv">${jp(o)}</span>`;
  return Object.entries(o).map(([k,v]) =>
    `<div class="kv"><span class="kk">${esc(k)}</span><span class="vv">${(v && typeof v === 'object') ? jp(JSON.stringify(v)) : jp(v)}</span></div>`).join('');
}

// ── edit & save ─────────────────────────────────────────────────────
function openBlockEditor(bid){
  const b = currentBlocks[bid]; if (!b) return;
  const ed = $('ed-'+bid);
  if (ed.style.display === 'block'){ ed.style.display = 'none'; return; }
  ed.style.display = 'block';
  ed.innerHTML = `
    <div class="edit-row"><label>Гарчиг</label><input id="ti-${bid}" style="flex:1" value="${esc(b.title_mn||'')}"></div>
    <div class="edit-row"><label>XP</label><input id="xp-${bid}" type="number" style="width:100px" value="${b.xp_reward||0}"></div>
    <div class="edit-row"><label>content JSON</label></div>
    <textarea class="edit" id="ta-${bid}">${esc(JSON.stringify(b.content||{},null,2))}</textarea>
    <div class="edit-row"><button class="js-save" data-block="${bid}">Хадгалах</button>
      <button class="mini js-cancel">Болих</button><span class="save-msg" id="msg-${bid}"></span></div>`;
  ed.querySelector('.js-save').onclick = () => saveBlock(bid);
  ed.querySelector('.js-cancel').onclick = () => { ed.style.display = 'none'; };
}
async function saveBlock(bid){
  const msg = $('msg-'+bid); msg.className = 'save-msg'; msg.textContent = 'хадгалж байна…';
  let content;
  try { content = JSON.parse($('ta-'+bid).value); }
  catch (e){ msg.className = 'save-msg err'; msg.textContent = 'JSON алдаа: ' + e.message; return; }
  const title_mn = $('ti-'+bid).value, xp_reward = parseInt($('xp-'+bid).value) || 0;
  const { error } = await sb.from('lesson_blocks').update({ content, title_mn, xp_reward }).eq('id', bid);
  if (error){ msg.className = 'save-msg err'; msg.textContent = permHint(error.message); return; }
  msg.className = 'save-msg ok'; msg.textContent = '✓ хадгаллаа';
  currentBlocks[bid] = { ...currentBlocks[bid], content, title_mn, xp_reward };
  const wrap = document.querySelector(`.blk[data-block="${bid}"]`);
  if (wrap){
    wrap.querySelector('.rendered').innerHTML = renderBody(currentBlocks[bid]);
    wrap.querySelector('pre').textContent = JSON.stringify(content, null, 2);
    const x = wrap.querySelector('.xp'); if (x) x.textContent = '+' + xp_reward + ' XP';
  }
}

// ── Үгс (бүх хичээлээс цугларсан) ───────────────────────────────────
function extractVocab(c){
  if (!c) return [];
  const src = c.new_vocabulary || c.words || c.vocabulary || c.items || [];
  if (!Array.isArray(src)) return [];
  return src.filter(v => v && (v.word||v.jp||v.character))
    .map(v => ({ word: v.word||v.jp||v.character, reading: v.reading||v.romaji||'', meaning: v.meaning_mn||v.meaning||v.mn||'' }));
}
async function showVocab(){
  if (!sb) return;
  setTab('vocab'); solo(true);
  $('view').innerHTML = `<div class="empty">Үгс цуглуулж байна…</div>`;
  const [blocksR, lessR, modsR] = await Promise.all([
    sb.from('lesson_blocks').select('lesson_id,content'),
    sb.from('lessons').select('id,module_id'),
    sb.from('modules').select('id,level_id')
  ]);
  if (blocksR.error) return $('view').innerHTML = errBox(blocksR.error.message);

  const modLevel = {}; (modsR.data||[]).forEach(m => modLevel[m.id] = m.level_id);
  const lesLevel = {}; (lessR.data||[]).forEach(l => lesLevel[l.id] = modLevel[l.module_id]);
  const lvCode = {}; LEVELS.forEach(l => lvCode[l.id] = l.code);

  const byLevel = {}; const seen = new Set(); let total = 0;
  for (const b of (blocksR.data||[])){
    const code = lvCode[lesLevel[b.lesson_id]] || 'Бусад';
    for (const v of extractVocab(b.content)){
      const key = code + '|' + v.word;
      if (seen.has(key)) continue; seen.add(key);
      (byLevel[code] = byLevel[code] || []).push(v); total++;
    }
  }
  if (!total) return $('view').innerHTML = `<div class="empty"><b>Үг олдсонгүй</b>Хичээлүүдэд үгсийн блок (vocabulary / wrapup) ороогүй байна.</div>`;

  const order = LEVELS.map(l => l.code).concat('Бусад');
  let h = `<h2 style="font-size:20px;margin-bottom:4px">Үгсийн сан</h2>
    <p style="color:var(--dim);margin-bottom:16px">Бүх хичээлээс цугларсан ${total} үг, түвшнээр нь.</p>`;
  for (const code of order){
    const list = byLevel[code]; if (!list?.length) continue;
    h += `<div class="modhead" style="margin-top:14px">${esc(code)} · ${list.length} үг</div>`;
    h += list.map(vrow).join('');
  }
  $('view').innerHTML = h;
  setStatus(`Үгс ${total}`, 'ok');
}

// ── Шалгах (QA) ─────────────────────────────────────────────────────
async function runQA(){
  if (!sb) return;
  setTab('qa'); solo(true);
  $('view').innerHTML = `<div class="empty">Шалгаж байна… бүх хүснэгтийг уншиж байна</div>`;
  const [langsR, levelsR, modsR, lessR, blocksR, kanaR] = await Promise.all([
    sb.from('languages').select('id,code,name_mn'),
    sb.from('levels').select('id,code,name_mn,lesson_count,target_kanji,status'),
    sb.from('modules').select('id,level_id,title_mn,status'),
    sb.from('lessons').select('id,module_id,title_mn,display_order,status,xp_reward,estimated_minutes'),
    sb.from('lesson_blocks').select('id,lesson_id,block_type,content'),
    sb.from('kana').select('id,character,kana_type,mnemonic_mn')
  ]);
  const langs = langsR.data||[], levels = levelsR.data||[], mods = modsR.data||[],
        lessons = lessR.data||[], blocks = blocksR.data||[], kana = kanaR.data||[];

  const issues = [];
  const push = (sev, text, goto, level) => issues.push({ sev, text, goto, level });

  const modLevel = {}; mods.forEach(m => modLevel[m.id] = m.level_id);
  const lesLevel = {}; lessons.forEach(l => lesLevel[l.id] = modLevel[l.module_id]);

  const blocksByLesson = {}; const typeCount = {};
  let bridged = 0, explTotal = 0;
  for (const b of blocks){
    blocksByLesson[b.lesson_id] = (blocksByLesson[b.lesson_id]||0) + 1;
    const t = (b.content && b.content.type) || b.block_type || 'unknown';
    typeCount[t] = (typeCount[t]||0) + 1;
    if (t === 'explanation'){ explTotal++; if (b.content && b.content.mongolian_bridge) bridged++; }
  }

  lessons.filter(l => !blocksByLesson[l.id]).forEach(l =>
    push('e', `Хоосон хичээл: <span class="jp">${esc(l.title_mn||'')}</span> — агуулга алга`, l.id, lesLevel[l.id]));

  const lessonsByModule = {}; lessons.forEach(l => lessonsByModule[l.module_id] = (lessonsByModule[l.module_id]||0)+1);
  const modsByLevel = {}; mods.forEach(m => (modsByLevel[m.level_id] = modsByLevel[m.level_id]||[]).push(m));
  for (const lv of levels){
    const actual = (modsByLevel[lv.id]||[]).reduce((s,m) => s + (lessonsByModule[m.id]||0), 0);
    if (actual === 0) push('w', `${esc(lv.code)} дүрэм: хичээл огт алга (seed хийгдээгүй байж болзошгүй)`);
    else if (typeof lv.lesson_count === 'number' && lv.lesson_count !== actual)
      push('w', `${esc(lv.code)} дүрэм: төлөвлөсөн <b>${lv.lesson_count}</b> ч бодит <b>${actual}</b> хичээл`);
  }

  const draft = lessons.filter(l => l.status && l.status !== 'published').length;
  if (draft) push('i', `${draft} хичээл ноорог хэвээр — нийтлэхэд бэлэн үү?`);
  const noXp = lessons.filter(l => !l.xp_reward).length;
  if (noXp) push('i', `${noXp} хичээлд XP тохируулаагүй`);

  Object.entries(typeCount).filter(([t]) => !KNOWN.has(t)).forEach(([t,n]) =>
    push('i', `Шинэ блокийн төрөл «<b>${esc(t)}</b>» × ${n} — ерөнхий бүтцээр харагдана`));

  const hi = kana.filter(k => k.kana_type==='hiragana').length, ka = kana.filter(k => k.kana_type==='katakana').length;
  const noMn = kana.filter(k => !k.mnemonic_mn).length;
  if (kana.length !== 92) push('e', `Үсэг нийт <b>${kana.length}</b> — 92 байх ёстой (ひらがな ${hi}, カタカナ ${ka})`);
  if (noMn) push('w', `${noMn} үсэгт монгол санамж алга — «Үсэг» таб дээр ✎-ээр нэмнэ`);

  const errs = issues.filter(i => i.sev==='e').length, warns = issues.filter(i => i.sev==='w').length;
  const bridgePct = explTotal ? Math.round(bridged/explTotal*100) : 0;

  let h = `<div class="qa-verdict ${errs?'bad':'good'}">
      <div class="big">${errs || '✓'}</div>
      <div><div style="font-weight:700">${errs ? errs+' ноцтой асуудал' : (warns ? 'Ажиллаж байна · анхаарах зүйлтэй' : 'Бүх контент эрүүл')}</div>
      <div class="lab">${warns} анхааруулга · ${issues.filter(i=>i.sev==='i').length} тэмдэглэл</div></div></div>
    <div class="stats">
      <div class="stat"><b>${langs.length}</b><span>хэл</span></div>
      <div class="stat"><b>${levels.length}</b><span>түвшин</span></div>
      <div class="stat"><b>${mods.length}</b><span>модуль</span></div>
      <div class="stat"><b>${lessons.length}</b><span>хичээл</span></div>
      <div class="stat"><b>${blocks.length}</b><span>блок</span></div>
      <div class="stat ${kana.length!==92?'bad':''}"><b>${kana.length}</b><span>үсэг</span></div>
      <div class="stat"><b>${bridgePct}%</b><span>гүүртэй</span></div>
    </div>`;

  // түвшин бүрийн хичээлийн тоо — N4/N3 хаана байгааг тод харуулна
  h += `<div class="qa-group">Түвшин бүрийн хичээл</div>`;
  for (const lv of levels){
    const actual = (modsByLevel[lv.id]||[]).reduce((s,m) => s + (lessonsByModule[m.id]||0), 0);
    const sev = actual === 0 ? 'w' : 'g';
    h += `<div class="issue ${sev}"><span class="ic">${actual===0?'!':'✓'}</span>
      <span><b>${esc(lv.code)} дүрэм</b> — ${actual} хичээл${actual===0?' (ороогүй)':''}</span></div>`;
  }

  h += `<div class="qa-group">Блокийн төрлийн тархалт</div>
    <div class="typedist">${Object.entries(typeCount).sort((a,b)=>b[1]-a[1])
      .map(([t,n]) => `<span class="${KNOWN.has(t)?'':'new'}">${esc(t)} · ${n}</span>`).join('')}</div>`;

  const group = (title, sev) => {
    const list = issues.filter(i => i.sev === sev);
    if (!list.length) return '';
    const ic = { e:'✕', w:'!', i:'·' }[sev];
    return `<div class="qa-group">${title}</div>` + list.map(i =>
      `<div class="issue ${sev}"><span class="ic">${ic}</span><span>${i.text}${
        i.goto ? ` <a data-goto="${i.goto}" data-level="${i.level||''}">→ нээх</a>` : ''}</span></div>`).join('');
  };
  h += group('Ноцтой — заавал засах', 'e');
  h += group('Анхааруулга', 'w');
  h += group('Тэмдэглэл', 'i');
  if (!errs && !warns) h += `<div class="issue g" style="margin-top:12px"><span class="ic">✓</span><span>Эвдэрсэн хичээл алга, үсэг бүрэн, тоо тааран байна.</span></div>`;

  $('view').innerHTML = h;
  setStatus(`Шалгалт · ${errs} алдаа · ${warns} анхаар`, errs ? 'err' : 'ok');
  $('view').querySelectorAll('[data-goto]').forEach(a =>
    a.onclick = () => gotoLesson(a.dataset.goto, a.dataset.level || null));
}

// ── auto-connect ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  $('url').value = CONFIG.url; $('key').value = CONFIG.key;
  measure();
  if (CONFIG.url && CONFIG.key) connect();
});
</script>
</body>
</html>
